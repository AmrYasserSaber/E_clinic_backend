<section class="space-y-4">
  <div class="flex items-end justify-between px-1">
    <h2 class="patient-section-title">Upcoming</h2>
  </div>

  <article class="patient-neumorphic-card">
    <div class="mb-6 flex items-start gap-4">
      <img
        src="{{ doctor_image|default:'https://lh3.googleusercontent.com/aida-public/AB6AXuAhIq3AfPCYWSjczpL581_48989NBmdsGUNg6N3rNAevLLrk1Cwlh_iPV0dnCPtffq65MRvfY5SEHXkMHBzxlJlA1egWJv3xGIyNQqWB7nOhj7clvaGb9uW55wsXRU2k03u6ahatA3U32NDWInYvXUkuPJ79shVqHwaXlNsz5kElDz8rN0SUGGD0kujRj5zIFfIgnpIlIMi99fMJ01JeXzCSz89dcBM_fxFK1nLCGzAwJ_-nf8JqGguUVVI-Y6A4KnZ_xOKCj8PMhbE' }}"
        alt="Doctor avatar"
        class="h-20 w-20 rounded-xl object-cover shadow-sm"
      >
      <div class="flex-1">
        <span class="rounded-full bg-[#CAF0F8]/70 px-2 py-0.5 text-xs font-bold uppercase tracking-wider text-app-primary">
          {{ specialty|default:"Cardiologist" }}
        </span>
        <h3 class="mt-1 text-xl font-headline font-bold text-app-text">{{ doctor_name|default:"Dr. James Wilson" }}</h3>
        <p class="text-sm text-app-text-muted">{{ clinic_name|default:"St. Mary's Heart Center" }}</p>
      </div>
    </div>

    <div class="mb-6 grid grid-cols-2 gap-4">
      <div class="patient-info-chip flex items-center gap-3">
        <div class="flex items-center text-app-primary">
          <span class="material-symbols-outlined text-[20px]">calendar_today</span>
        </div>
        <div>
          <p class="text-[10px] font-bold uppercase text-app-text-muted/60">Date</p>
          <p class="text-sm font-semibold text-app-text">{{ appointment_date|default:"Oct 24, 2023" }}</p>
        </div>
      </div>
      <div class="patient-info-chip flex items-center gap-3">
        <div class="flex items-center text-app-primary">
          <span class="material-symbols-outlined text-[20px]">schedule</span>
        </div>
        <div>
          <p class="text-[10px] font-bold uppercase text-app-text-muted/60">Time</p>
          <p class="text-sm font-semibold text-app-text">{{ appointment_time|default:"09:30 AM" }}</p>
        </div>
      </div>
    </div>

    <button class="patient-medical-gradient flex w-full items-center justify-center gap-2 rounded-xl py-4 font-bold text-white shadow-lg shadow-app-primary/20 transition-transform active:scale-95">
      <span class="material-symbols-outlined">near_me</span>
      <span>{{ action_text|default:"Get Directions" }}</span>
    </button>
  </article>
</section>
