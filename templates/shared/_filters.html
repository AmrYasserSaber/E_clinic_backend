<section class="app-card mb-6">
  <div class="grid gap-3 md:grid-cols-4">
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-app-text-muted">Date From</label>
      <input class="app-input" type="date" data-filter="date_from">
    </div>
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-app-text-muted">Date To</label>
      <input class="app-input" type="date" data-filter="date_to">
    </div>
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-app-text-muted">Doctor</label>
      <select class="app-input" data-filter="doctor_id">
        <option value="">All Doctors</option>
      </select>
    </div>
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-app-text-muted">Status</label>
      <select class="app-input" data-filter="status">
        <option value="">All Statuses</option>
        <option value="requested">Requested</option>
        <option value="confirmed">Confirmed</option>
        <option value="checked_in">Checked In</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
        <option value="no_show">No Show</option>
      </select>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap gap-2">
    <button type="button" class="app-btn-primary" data-action="apply-filters">Apply Filters</button>
    <button type="button" class="app-btn-secondary" data-action="reset-filters">Reset</button>
  </div>
</section>
